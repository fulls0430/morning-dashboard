<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="朝ダッシュボード">
<meta name="theme-color" content="#0d1117">
<title>朝のダッシュボード</title>
<style>
  :root {
    --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
    --border:#30363d;--border2:#444c56;
    --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
    --green:#1D9E75;--green2:#0F6E56;
    --blue:#378ADD;--blue-dim:#378ADD22;
    --red:#E24B4A;--red-dim:#E24B4A15;
    --radius:10px;--radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{background:var(--bg);color:var(--text);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;}
  body{min-height:100vh;}

  /* sync indicator */
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s;}
  .sync-dot.syncing{background:#f59e0b;animation:pulse 1s ease-in-out infinite;}
  .sync-dot.ok{background:var(--green);}
  .sync-dot.err{background:var(--red);}

  header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .header-left{display:flex;align-items:center;gap:8px;}
  .header-title{font-size:15px;font-weight:600;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .header-right{display:flex;align-items:center;gap:8px;}
  .header-time{font-size:13px;color:var(--text2);font-variant-numeric:tabular-nums;}
  .sync-label{font-size:11px;color:var(--text3);}

  main{max-width:800px;margin:0 auto;padding:24px 16px 56px;display:flex;flex-direction:column;gap:16px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
  .card-label{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
  .card-value{font-size:30px;font-weight:600;line-height:1;}
  .card-sub{font-size:12px;color:var(--text2);margin-top:6px;}

  .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .sec-title{font-size:13px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:7px;}
  .sec-title::before{content:'';display:block;width:3px;height:13px;background:var(--green);border-radius:2px;}

  .prog-wrap{height:4px;background:var(--bg3);border-radius:2px;margin-bottom:14px;overflow:hidden;}
  .prog-bar{height:100%;background:var(--green);border-radius:2px;transition:width .4s ease;}

  .routine-list{display:flex;flex-direction:column;gap:6px;}
  .ri{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);transition:opacity .2s;}
  .ri.done{opacity:.45;}
  .ri.done .ri-label{text-decoration:line-through;color:var(--text3);}
  .ri-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .ri-check.checked{background:var(--green);border-color:var(--green);}
  .ri-check.checked::after{content:'';display:block;width:6px;height:10px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg) translateY(-1px);}
  .ri-label{flex:1;font-size:14px;color:var(--text);}
  .ri-del{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:0 2px;opacity:.4;transition:opacity .15s;}
  .ri-del:hover{opacity:1;color:var(--red);}
  .ri-drag{color:var(--text3);font-size:13px;cursor:grab;padding:0 2px;opacity:.35;user-select:none;flex-shrink:0;line-height:1;}
  .ri-drag:active{cursor:grabbing;}
  .ri.dragging{opacity:.3;border-style:dashed;}
  .ri.drag-over{border-color:var(--green);box-shadow:0 0 0 1px var(--green);}

  .add-row{display:flex;gap:8px;margin-top:10px;}
  .add-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:13px;padding:8px 12px;outline:none;transition:border-color .15s;}
  .add-row input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim);}
  .add-row input::placeholder{color:var(--text3);}
  .btn-add{background:var(--green);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;padding:8px 16px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s;}
  .btn-add:hover{background:var(--green2);}

  .btn-sm{font-size:12px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .btn-sm:hover{color:var(--red);border-color:var(--red);}

  .cal-wds{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
  .cal-wd{font-size:10px;color:var(--text3);text-align:center;}
  .cal-month-label{font-size:12px;color:var(--text2);font-weight:500;}
  .cal-nav{display:flex;align-items:center;gap:5px;margin-bottom:10px;}
  .cal-nav-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:15px;width:24px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:all .15s;flex-shrink:0;}
  .cal-nav-btn:hover{border-color:var(--green);color:var(--green);}
  .cal-nav-btn:disabled{opacity:.3;cursor:default;}
  .cal-jump-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:11px;padding:3px 8px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .cal-jump-btn:hover{border-color:var(--blue);color:var(--blue);}
  .cal-jump-panel{display:none;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px;margin-bottom:10px;}
  .cal-jump-panel.open{display:block;}
  .cal-jump-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .cal-jump-row select{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:12px;padding:4px 8px;outline:none;cursor:pointer;}
  .cal-jump-go{background:var(--green);border:none;border-radius:var(--radius-sm);color:#fff;font-size:12px;padding:4px 12px;cursor:pointer;font-family:inherit;}
  .cal-jump-go:hover{background:var(--green2);}
  .cal-today-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);font-size:11px;padding:3px 8px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .cal-today-btn:hover{border-color:var(--blue);color:var(--blue);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cal-cell{aspect-ratio:1;border-radius:3px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);font-variant-numeric:tabular-nums;}
  .cal-cell.heat-1{background:#0F6E5638;border-color:#0F6E5655;color:#8b949e;}
  .cal-cell.heat-2{background:#0F6E5660;border-color:#0F6E5688;color:#c8d1da;}
  .cal-cell.heat-3{background:#1D9E75aa;border-color:#1D9E75cc;color:#fff;}
  .cal-cell.heat-full{background:var(--green);border-color:var(--green2);color:#fff;font-weight:600;}
  .cal-cell.today{box-shadow:0 0 0 2px var(--blue);}
  .cal-legend{display:flex;align-items:center;gap:5px;margin-top:8px;justify-content:flex-end;}
  .cal-legend-label{font-size:10px;color:var(--text3);}
  .cal-legend-cell{width:10px;height:10px;border-radius:2px;border:1px solid var(--border);}
  .cal-legend-cell.l1{background:#0F6E5638;}
  .cal-legend-cell.l2{background:#0F6E5660;}
  .cal-legend-cell.l3{background:#1D9E75aa;}
  .cal-legend-cell.l4{background:var(--green);}

  .btn-ci{width:100%;padding:11px;font-size:14px;font-weight:600;background:var(--green);border:none;border-radius:var(--radius-sm);color:#fff;cursor:pointer;font-family:inherit;transition:background .15s;}
  .btn-ci:hover{background:var(--green2);}
  .btn-ci:disabled{background:var(--bg3);color:var(--text3);border:1px solid var(--border);cursor:default;}
  .btn-undo{width:100%;margin-top:7px;padding:8px;font-size:12px;background:var(--red-dim);border:1px solid var(--red);border-radius:var(--radius-sm);color:var(--red);cursor:pointer;font-family:inherit;display:none;transition:background .15s;}
  .btn-undo:hover{background:#E24B4A28;}
  .ci-msg{font-size:12px;color:var(--green);text-align:center;margin-top:8px;min-height:16px;}

  .topic-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:28px;}
  .tag{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);background:var(--bg3);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;user-select:none;}
  .tag.active{background:#378ADD22;color:var(--blue);border-color:var(--blue);}
  .tag.tag-dragging{opacity:.3;}
  .tag.tag-drag-over{border-color:var(--green);box-shadow:0 0 0 1px var(--green);}
  .tag-drag-handle{opacity:.4;font-size:10px;cursor:grab;}
  .tag-drag-handle:active{cursor:grabbing;}
  .tag-del{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:0;line-height:1;opacity:.5;}
  .tag-del:hover{opacity:1;color:var(--red);}

  .log-area{width:100%;min-height:90px;resize:vertical;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;line-height:1.6;outline:none;transition:border-color .15s;}
  .log-area:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim);}
  .log-area::placeholder{color:var(--text3);}

  .btn-row{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;}
  .btn{padding:7px 16px;font-size:13px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;font-family:inherit;transition:background .15s;}
  .btn:hover{background:var(--bg3);}
  .btn.primary{background:var(--green);border-color:var(--green2);color:#fff;}
  .btn.primary:hover{background:var(--green2);}

  .log-list{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;}
  .log-list::-webkit-scrollbar{width:4px;}
  .log-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .log-entry{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;gap:8px;align-items:flex-start;}
  .log-body{flex:1;}
  .log-date{font-size:11px;color:var(--text3);margin-bottom:3px;}
  .log-text{font-size:13px;color:var(--text);line-height:1.55;}
  .log-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;opacity:.4;transition:opacity .15s;}
  .log-del:hover{opacity:1;color:var(--red);}

  .quote-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:var(--radius);padding:16px 20px;font-size:13px;color:var(--text2);font-style:italic;text-align:center;line-height:1.7;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);border:1px solid var(--border2);font-size:13px;padding:9px 20px;border-radius:var(--radius);opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:999;}
  .toast.show{opacity:1;}
  .empty{font-size:13px;color:var(--text3);text-align:center;padding:1.5rem;}

  @media(max-width:540px){
    .grid-3{grid-template-columns:1fr 1fr;}
    .grid-3 .card:last-child{grid-column:span 2;}
    .grid-2{grid-template-columns:1fr;}
    main{padding:16px 12px 48px;}
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="dot"></div>
    <div class="header-title">朝のダッシュボード</div>
  </div>
  <div class="header-right">
    <div class="sync-dot" id="sync-dot"></div>
    <span class="sync-label" id="sync-label">接続中...</span>
    <div class="header-time" id="header-time"></div>
  </div>
</header>

<main>
  <div class="grid-3">
    <div class="card">
      <div class="card-label">現在時刻</div>
      <div class="card-value" id="clock">--:--</div>
      <div class="card-sub" id="datestr"></div>
    </div>
    <div class="card">
      <div class="card-label">ルーティン進捗</div>
      <div class="card-value"><span id="done-count">0</span><span style="font-size:16px;color:var(--text2)"> / <span id="total-count">0</span></span></div>
      <div class="card-sub">完了 / 全項目</div>
    </div>
    <div class="card">
      <div class="card-label">AI学習ストリーク</div>
      <div class="card-value">🔥 <span id="streak">0</span></div>
      <div class="card-sub">連続日数</div>
    </div>
  </div>

  <div class="card">
    <div class="sec-head">
      <div class="sec-title">朝のルーティン</div>
      <button class="btn-sm" onclick="resetToday()">今日をリセット</button>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>
    <div class="routine-list" id="routine-list"><div class="empty">読み込み中...</div></div>
    <div class="add-row">
      <input type="text" id="new-item" placeholder="新しい項目を追加... (Enterで追加)" onkeydown="if(event.key==='Enter')addItem()">
      <button class="btn-add" onclick="addItem()">追加</button>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="sec-head"><div class="sec-title">AI学習チェックイン</div></div>
      <div class="topic-wrap" id="topic-tags"></div>
      <div class="add-row" style="margin-bottom:10px;">
        <input type="text" id="new-tag" placeholder="タグを追加... (Enterで追加)" onkeydown="if(event.key==='Enter')addTag()">
        <button class="btn-add" onclick="addTag()">追加</button>
      </div>
      <button class="btn-ci" id="ci-btn" onclick="doCheckin()">今日の学習を記録する</button>
      <button class="btn-undo" id="undo-btn" onclick="undoCheckin()">チェックインを取り消す</button>
      <div class="ci-msg" id="ci-msg"></div>
    </div>
    <div class="card">
      <div class="sec-head" style="margin-bottom:8px;">
        <div class="sec-title">学習カレンダー</div>
        <div class="cal-nav">
          <button class="cal-nav-btn" id="cal-prev" onclick="shiftMonth(-1)">&#8249;</button>
          <span class="cal-month-label" id="cal-month-label"></span>
          <button class="cal-nav-btn" id="cal-next" onclick="shiftMonth(1)">&#8250;</button>
          <button class="cal-jump-btn" onclick="toggleJump()">指定</button>
          <button class="cal-today-btn" onclick="goToday()">今月</button>
        </div>
      </div>
      <div class="cal-jump-panel" id="cal-jump-panel">
        <div class="cal-jump-row">
          <select id="jump-year"></select>
          <select id="jump-month">
            <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
            <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
            <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
            <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
          </select>
          <button class="cal-jump-go" onclick="doJump()">移動</button>
        </div>
      </div>
      <div class="cal-wds">
        <div class="cal-wd">月</div><div class="cal-wd">火</div><div class="cal-wd">水</div>
        <div class="cal-wd">木</div><div class="cal-wd">金</div><div class="cal-wd">土</div><div class="cal-wd">日</div>
      </div>
      <div class="cal-grid" id="cal"></div>
      <div class="cal-legend">
        <span class="cal-legend-label">少</span>
        <div class="cal-legend-cell l1"></div><div class="cal-legend-cell l2"></div>
        <div class="cal-legend-cell l3"></div><div class="cal-legend-cell l4"></div>
        <span class="cal-legend-label">全完了</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="sec-head"><div class="sec-title">学習ログ・メモ</div></div>
    <textarea class="log-area" id="log-input" placeholder="今日学んだことをメモしよう..."></textarea>
    <div class="btn-row">
      <button class="btn" onclick="document.getElementById('log-input').value=''">クリア</button>
      <button class="btn primary" onclick="saveLog()">保存する</button>
    </div>
  </div>

  <div class="card">
    <div class="sec-head"><div class="sec-title">過去のログ</div></div>
    <div class="log-list" id="log-list"><div class="empty">まだログがありません。最初の学習を記録しよう！</div></div>
  </div>

  <div class="quote-card" id="quote"></div>
</main>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ===== Firebase設定 =====
const firebaseConfig = {
  apiKey: "AIzaSyAR-SyxvyK0q22nZCqpVobPJ-yUXjxe_0g",
  authDomain: "am5-dash-board.firebaseapp.com",
  projectId: "am5-dash-board",
  storageBucket: "am5-dash-board.firebasestorage.app",
  messagingSenderId: "330841331775",
  appId: "1:330841331775:web:576d3db41e477cf3f5008a",
  databaseURL: "https://am5-dash-board-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== ユーティリティ =====
const QUOTES=['「天才とは、努力し続けることのできる人間のことだ。」— カーライル','「朝5時の1時間は、夜の3時間に勝る。」','「小さな積み重ねこそが、とんでもないところへ連れていってくれる。」','「習慣は第二の天性なり。」','「学ぶことをやめた人は、20歳でも80歳でも老人だ。」— フォード'];
const DEFAULT_TAGS=['LLM基礎','プロンプト','RAG','ファインチューニング','エージェント','その他'];

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function escAttr(s){return s.replace(/'/g,"\\'");}

let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);}

function setSyncStatus(status){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  dot.className='sync-dot '+status;
  lbl.textContent=status==='ok'?'同期済み':status==='syncing'?'同期中...':'オフライン';
}

// ===== 時計 =====
function updateClock(){
  const n=new Date(),days=['日','月','火','水','木','金','土'];
  const t=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent=t;
  document.getElementById('header-time').textContent=t;
  document.getElementById('datestr').textContent=n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日（'+days[n.getDay()]+'）';
}
updateClock();setInterval(updateClock,30000);

// ===== ローカルキャッシュ（オフライン対応） =====
let cache={items:[],checks:{},checkins:[],logs:[],tags:null};

// ===== Firebase読み書き =====
async function fbGet(path){
  try{const s=await get(ref(db,path));return s.exists()?s.val():null;}catch(e){return null;}
}
async function fbSet(path,val){
  setSyncStatus('syncing');
  try{await set(ref(db,path),val);setSyncStatus('ok');}
  catch(e){setSyncStatus('err');toast('同期エラー。再試行してください');}
}

// ===== リアルタイム監視 =====
function watchAll(){
  onValue(ref(db,'data'),snap=>{
    const d=snap.val()||{};
    cache.items=d.items||[];
    cache.checks=d.checks||{};
    cache.checkins=d.checkins||[];
    cache.logs=d.logs||[];
    cache.tags=d.tags||null;
    setSyncStatus('ok');
    renderRoutine();renderTags();syncCi();renderLogs();buildCal();
  },()=>setSyncStatus('err'));
}

// ===== ルーティン =====
function getItems(){return cache.items||[];}
function getChecks(){return (cache.checks||{})[today()]||[];}

function renderRoutine(){
  const items=getItems(),checks=getChecks();
  const list=document.getElementById('routine-list');
  if(!items.length){list.innerHTML='<div class="empty">項目がありません。下から追加してください。</div>';updateProg(0,0);return;}
  list.innerHTML=items.map((item,i)=>{
    const done=checks.includes(i);
    return '<div class="ri'+(done?' done':'')+'" draggable="true" data-idx="'+i+'">'
      +'<span class="ri-drag" title="ドラッグして並び替え">⠿⠿</span>'
      +'<div class="ri-check'+(done?' checked':'')+'" onclick="toggleCheck('+i+')"></div>'
      +'<span class="ri-label">'+esc(item)+'</span>'
      +'<button class="ri-del" onclick="delItem('+i+')" title="削除">✕</button>'
      +'</div>';
  }).join('');
  updateProg(checks.length,items.length);
  initDrag();
}

function updateProg(done,total){
  document.getElementById('done-count').textContent=done;
  document.getElementById('total-count').textContent=total;
  document.getElementById('prog').style.width=total>0?Math.round(done/total*100)+'%':'0%';
}

window.toggleCheck=function(i){
  let c=[...getChecks()];
  c=c.includes(i)?c.filter(x=>x!==i):[...c,i];
  cache.checks[today()]=c;
  renderRoutine();buildCal();
  fbSet('data/checks',cache.checks);
};

window.addItem=function(){
  const inp=document.getElementById('new-item'),val=inp.value.trim();if(!val)return;
  cache.items=[...getItems(),val];inp.value='';renderRoutine();
  fbSet('data/items',cache.items);toast('項目を追加しました');
};

window.delItem=function(i){
  const items=[...getItems()];items.splice(i,1);
  cache.items=items;
  let c=getChecks().filter(x=>x!==i).map(x=>x>i?x-1:x);
  cache.checks[today()]=c;
  renderRoutine();
  fbSet('data/items',cache.items);
  fbSet('data/checks',cache.checks);
  toast('項目を削除しました');
};

window.resetToday=function(){
  cache.checks[today()]=[];
  renderRoutine();buildCal();
  fbSet('data/checks',cache.checks);
  toast('今日のチェックをリセットしました');
};

let dragSrc=null;
function initDrag(){
  const list=document.getElementById('routine-list');
  list.querySelectorAll('.ri').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragSrc=el;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>{dragSrc=null;list.querySelectorAll('.ri').forEach(r=>r.classList.remove('dragging','drag-over'));});
    el.addEventListener('dragover',e=>{e.preventDefault();if(el===dragSrc)return;list.querySelectorAll('.ri').forEach(r=>r.classList.remove('drag-over'));el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault();if(!dragSrc||dragSrc===el)return;
      const from=parseInt(dragSrc.dataset.idx),to=parseInt(el.dataset.idx);
      const items=[...getItems()];const[moved]=items.splice(from,1);items.splice(to,0,moved);
      cache.items=items;
      let checks=getChecks();
      cache.checks[today()]=checks.map(idx=>{if(idx===from)return to;if(from<to&&idx>from&&idx<=to)return idx-1;if(from>to&&idx>=to&&idx<from)return idx+1;return idx;});
      renderRoutine();
      fbSet('data/items',cache.items);fbSet('data/checks',cache.checks);
      toast('並び替えました');
    });
  });
}

// ===== カレンダー =====
const _now=new Date();
let calYear=_now.getFullYear(),calMonth=_now.getMonth();

function buildCal(){
  const y=calYear,m=calMonth,td=today();
  const ci=new Set(cache.checkins||[]);
  const allChecks=cache.checks||{};
  const totalItems=getItems().length;
  const first=new Date(y,m,1).getDay(),offset=first===0?6:first-1;
  const days=new Date(y,m+1,0).getDate();
  const cal=document.getElementById('cal');cal.innerHTML='';
  const lbl=document.getElementById('cal-month-label');
  if(lbl)lbl.textContent=y+'年'+(m+1)+'月';
  const nextBtn=document.getElementById('cal-next');
  if(nextBtn)nextBtn.disabled=(y===_now.getFullYear()&&m===_now.getMonth());
  for(let i=0;i<offset;i++){const b=document.createElement('div');b.style.aspectRatio='1';cal.appendChild(b);}
  for(let d=1;d<=days;d++){
    const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const c=document.createElement('div');
    const doneCount=(allChecks[ds]||[]).length;
    let heatClass='';
    if(totalItems>0&&doneCount>0){const ratio=doneCount/totalItems;if(ratio>=1)heatClass='heat-full';else if(ratio>=0.66)heatClass='heat-3';else if(ratio>=0.33)heatClass='heat-2';else heatClass='heat-1';}
    c.className='cal-cell'+(heatClass?' '+heatClass:'')+(ds===td?' today':'');
    c.textContent=d;
    if(ci.has(ds)){c.style.outline='2px solid var(--green)';c.style.outlineOffset='-2px';}
    cal.appendChild(c);
  }
}

window.shiftMonth=function(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}buildCal();};
window.goToday=function(){calYear=_now.getFullYear();calMonth=_now.getMonth();buildCal();document.getElementById('cal-jump-panel').classList.remove('open');};
window.toggleJump=function(){
  const p=document.getElementById('cal-jump-panel');
  const isOpen=p.classList.toggle('open');
  if(isOpen){const ySel=document.getElementById('jump-year');ySel.innerHTML='';for(let y=_now.getFullYear();y>=_now.getFullYear()-5;y--){const o=document.createElement('option');o.value=y;o.textContent=y+'年';if(y===calYear)o.selected=true;ySel.appendChild(o);}document.getElementById('jump-month').value=calMonth+1;}
};
window.doJump=function(){calYear=parseInt(document.getElementById('jump-year').value);calMonth=parseInt(document.getElementById('jump-month').value)-1;buildCal();document.getElementById('cal-jump-panel').classList.remove('open');};

// ===== AI学習チェックイン =====
function calcStreak(){
  const ci=cache.checkins||[];if(!ci.length)return 0;
  let s=0;const cur=new Date();cur.setHours(0,0,0,0);
  for(let i=0;i<365;i++){
    const ds=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    if(ci.includes(ds)){s++;}else if(i===0){cur.setDate(cur.getDate()-1);continue;}else break;
    cur.setDate(cur.getDate()-1);
  }
  return s;
}

function syncCi(){
  const done=(cache.checkins||[]).includes(today());
  const btn=document.getElementById('ci-btn'),ub=document.getElementById('undo-btn'),msg=document.getElementById('ci-msg');
  btn.disabled=done;btn.textContent=done?'記録済み':'今日の学習を記録する';
  ub.style.display=done?'block':'none';
  msg.textContent=done?'今日の学習は記録済みです 🎉':'';
  document.getElementById('streak').textContent=calcStreak();
  buildCal();
}

let selTopics=[];
window.doCheckin=function(){
  const td=today(),ci=[...(cache.checkins||[])];if(ci.includes(td))return;
  ci.push(td);cache.checkins=ci;syncCi();
  fbSet('data/checkins',cache.checkins);
  if(selTopics.length){const inp=document.getElementById('log-input');if(!inp.value)inp.value='【'+selTopics.join('・')+'】\n';}
  toast('チェックインしました！');
};

window.undoCheckin=function(){
  cache.checkins=(cache.checkins||[]).filter(d=>d!==today());
  syncCi();fbSet('data/checkins',cache.checkins);toast('チェックインを取り消しました');
};

// ===== タグ =====
function getTags(){return cache.tags||DEFAULT_TAGS;}
let tagDragSrc=null;

function renderTags(){
  const tags=getTags();
  const wrap=document.getElementById('topic-tags');
  wrap.innerHTML=tags.map((name,i)=>{
    const active=selTopics.includes(name);
    return '<span class="tag'+(active?' active':'')+'" draggable="true" data-tidx="'+i+'">'
      +'<span class="tag-drag-handle">⠿</span>'
      +'<span onclick="toggleTopic(\''+escAttr(name)+'\')">'+esc(name)+'</span>'
      +'<button class="tag-del" onclick="delTag('+i+')" title="削除">✕</button>'
      +'</span>';
  }).join('');
  initTagDrag();
}

window.toggleTopic=function(name){selTopics=selTopics.includes(name)?selTopics.filter(t=>t!==name):[...selTopics,name];renderTags();};

window.addTag=function(){
  const inp=document.getElementById('new-tag'),val=inp.value.trim();if(!val)return;
  const tags=getTags();if(tags.includes(val)){toast('すでに存在するタグです');return;}
  cache.tags=[...tags,val];inp.value='';renderTags();
  fbSet('data/tags',cache.tags);toast('タグを追加しました');
};

window.delTag=function(i){
  const tags=[...getTags()];const name=tags[i];tags.splice(i,1);
  cache.tags=tags;selTopics=selTopics.filter(t=>t!==name);
  renderTags();fbSet('data/tags',cache.tags);toast('タグを削除しました');
};

function initTagDrag(){
  const wrap=document.getElementById('topic-tags');
  wrap.querySelectorAll('.tag').forEach(el=>{
    el.addEventListener('dragstart',e=>{tagDragSrc=el;el.classList.add('tag-dragging');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>{tagDragSrc=null;wrap.querySelectorAll('.tag').forEach(t=>t.classList.remove('tag-dragging','tag-drag-over'));});
    el.addEventListener('dragover',e=>{e.preventDefault();if(el===tagDragSrc)return;wrap.querySelectorAll('.tag').forEach(t=>t.classList.remove('tag-drag-over'));el.classList.add('tag-drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('tag-drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault();if(!tagDragSrc||tagDragSrc===el)return;
      const from=parseInt(tagDragSrc.dataset.tidx),to=parseInt(el.dataset.tidx);
      const tags=[...getTags()];const[moved]=tags.splice(from,1);tags.splice(to,0,moved);
      cache.tags=tags;renderTags();fbSet('data/tags',cache.tags);toast('タグを並び替えました');
    });
  });
}

// ===== 学習ログ =====
window.saveLog=function(){
  const val=document.getElementById('log-input').value.trim();if(!val)return;
  const logs=[{id:Date.now(),date:today(),text:val},...(cache.logs||[])];
  cache.logs=logs;document.getElementById('log-input').value='';
  renderLogs();fbSet('data/logs',cache.logs);toast('ログを保存しました');
};

window.deleteLog=function(id){
  cache.logs=(cache.logs||[]).filter(l=>l.id!==id);
  renderLogs();fbSet('data/logs',cache.logs);toast('ログを削除しました');
};

function renderLogs(){
  const logs=cache.logs||[],el=document.getElementById('log-list');
  if(!logs.length){el.innerHTML='<div class="empty">まだログがありません。最初の学習を記録しよう！</div>';return;}
  el.innerHTML=logs.slice(0,30).map(l=>
    '<div class="log-entry"><div class="log-body"><div class="log-date">'+l.date+'</div><div class="log-text">'+esc(l.text)+'</div></div>'
    +'<button class="log-del" onclick="deleteLog('+l.id+')" title="削除">✕</button></div>'
  ).join('');
}

// ===== 起動 =====
document.getElementById('quote').textContent=QUOTES[Math.floor(Math.random()*QUOTES.length)];
setSyncStatus('syncing');
watchAll();
</script>
